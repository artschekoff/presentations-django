<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Presentation generation</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f1ea;
        --panel: #ffffff;
        --ink: #1f1f1f;
        --muted: #5b5b5b;
        --accent: #2f6fed;
        --accent-2: #0f3eaa;
        --border: #d7d2c9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at top, #fff8e8 0%, #f1ede4 55%, #ebe6dc 100%);
        font-family: "Georgia", "Times New Roman", serif;
        color: var(--ink);
      }

      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 48px 24px 64px;
      }

      header {
        margin-bottom: 32px;
      }

      h1 {
        font-size: 40px;
        margin: 0 0 12px;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 18px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(20, 15, 10, 0.08);
        margin-bottom: 16px;
      }

      form {
        display: grid;
        gap: 18px;
      }

      .hidden {
        display: none;
      }

      label {
        display: block;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input[type="text"],
      input[type="file"],
      select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        font-size: 16px;
        font-family: "Arial", sans-serif;
      }

      input[type="file"] {
        padding: 10px 14px;
        background: #fafaf8;
        cursor: pointer;
      }

      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 999px;
        padding: 14px 24px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.2s ease;
      }

      button:hover {
        background: var(--accent-2);
        transform: translateY(-1px);
      }

      button:disabled {
        background: #9fb7f0;
        cursor: not-allowed;
        transform: none;
      }

      button.is-loading {
        position: relative;
        pointer-events: none;
      }

      button.is-loading::after {
        content: "";
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.7);
        border-top-color: transparent;
        border-radius: 50%;
        display: inline-block;
        margin-left: 8px;
        vertical-align: middle;
        animation: spin 0.8s linear infinite;
      }

      .btn-outline.is-loading::after,
      .btn-restart.is-loading::after {
        border-color: rgba(47, 111, 237, 0.55);
        border-top-color: transparent;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .btn-outline {
        background: #fff;
        color: var(--accent);
        border: 2px solid var(--accent);
      }

      .btn-outline:hover {
        background: #f0f5ff;
        color: var(--accent-2);
        border-color: var(--accent-2);
      }

      .btn-outline:disabled {
        background: #fff;
        color: #9fb7f0;
        border-color: #9fb7f0;
        cursor: not-allowed;
        transform: none;
      }

      .mode-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-top: 8px;
      }

      .mode-btn {
        background: #f8f5ef;
        border: 2px solid var(--border);
        border-radius: 16px;
        padding: 32px 20px;
        font-size: 17px;
        font-weight: 600;
        color: var(--ink);
        text-align: center;
        line-height: 1.4;
        transition: border-color 0.2s, background 0.2s, transform 0.2s;
      }

      .mode-btn:hover {
        background: var(--panel);
        border-color: var(--accent);
        color: var(--accent);
        transform: translateY(-2px);
      }

      .mode-label {
        display: block;
        font-size: 13px;
        font-weight: 400;
        color: var(--muted);
        margin-top: 6px;
        text-transform: none;
        letter-spacing: 0;
      }

      .csv-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .feedback-success {
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: 10px;
        background: #f0fdf4;
        border: 1px solid #86efac;
        color: #166534;
        font-size: 15px;
        font-family: "Arial", sans-serif;
      }

      .feedback-error-header {
        margin-top: 16px;
        margin-bottom: 8px;
        font-size: 14px;
        color: #b00020;
        font-weight: 600;
        font-family: "Arial", sans-serif;
      }

      .error-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        font-family: "Arial", sans-serif;
      }

      .error-table th {
        text-align: left;
        padding: 6px 10px;
        background: #fff5f5;
        border-bottom: 1px solid #fecaca;
        color: #b00020;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.06em;
      }

      .error-table td {
        padding: 6px 10px;
        border-bottom: 1px solid #fee2e2;
        color: #7f1d1d;
        vertical-align: top;
      }

      .error-table tr:last-child td {
        border-bottom: none;
      }

      .tasks {
        margin-top: 28px;
        display: grid;
        gap: 12px;
      }

      .task-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fffdf9;
        align-items: center;
      }

      .task-meta {
        display: grid;
        gap: 6px;
      }

      .task-title {
        font-weight: 600;
        font-size: 16px;
      }

      .task-status {
        font-size: 13px;
        color: var(--muted);
      }

      .task-progress {
        height: 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #efe9dc;
        overflow: hidden;
      }

      .task-progress span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, #2f6fed, #44b3ff);
        width: 0%;
        transition: width 0.3s ease;
      }

      .task-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .task-links a {
        font-size: 13px;
        color: var(--accent-2);
        text-decoration: none;
        border: 1px solid #d5def5;
        padding: 4px 8px;
        border-radius: 999px;
        background: #f3f7ff;
      }

      .task-actions {
        font-size: 12px;
        color: var(--muted);
      }

      .task-row--failed {
        border-color: #fca5a5;
        background: #fff5f5;
      }

      .task-row--failed .task-status {
        color: #b91c1c;
      }

      .task-error {
        font-size: 12px;
        color: #b91c1c;
        word-break: break-word;
      }

      .btn-restart {
        background: #dc2626;
        color: #fff;
        border: none;
        border-radius: 999px;
        padding: 6px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }

      .btn-restart:hover {
        background: #b91c1c;
        transform: translateY(-1px);
      }

      .btn-restart:disabled {
        background: #fca5a5;
        cursor: not-allowed;
        transform: none;
      }

      .add-task {
        margin-top: 16px;
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .add-task button {
        width: 100%;
        max-width: 240px;
      }

      .error {
        margin-top: 12px;
        color: #b00020;
        font-size: 14px;
        font-family: "Arial", sans-serif;
      }

      .user-bar {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        background: rgba(255, 255, 255, 0.95);
        border-bottom: 1px solid var(--border);
        padding: 12px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "Arial", sans-serif;
        z-index: 1000;
      }

      .user-info {
        font-size: 13px;
        color: var(--muted);
      }

      .user-info strong {
        color: var(--ink);
      }

      .user-actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .user-actions a,
      .user-actions button {
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
      }

      .user-actions .btn-token {
        background: var(--accent);
        color: #fff;
      }

      .user-actions .btn-token:hover {
        background: var(--accent-2);
      }

      .user-actions .btn-logout {
        background: #f5f5f5;
        color: var(--ink);
        border: 1px solid var(--border);
      }

      .user-actions .btn-logout:hover {
        background: #e8e8e8;
      }

      main {
        margin-top: 65px;
      }

    </style>
  </head>
  <body>
    {% if user.is_authenticated %}
    <div class="user-bar">
      <div class="user-info">
        Signed in as <strong>{{ user.username }}</strong>
      </div>
      <div class="user-actions">
        <form method="post" action="{% url 'logout' %}" style="display: inline;">
          {% csrf_token %}
          <button type="submit" class="btn-logout">Sign out</button>
        </form>
      </div>
    </div>
    {% else %}
    <div class="user-bar">
      <div class="user-info">Not signed in</div>
      <div class="user-actions">
        <a href="{% url 'login' %}" class="btn-token">Sign in</a>
      </div>
    </div>
    {% endif %}
    <main>
      <header>
        <h1>Create a new presentation</h1>
        <p>Fill in the fields to start generation and track progress.</p>
      </header>

      <!-- Mode selection -->
      <section class="panel" id="mode-selection">
        <p style="margin-bottom: 16px; font-family: Arial, sans-serif; font-size: 16px;">Choose a mode:</p>
        <div class="mode-grid">
          <button class="mode-btn" id="btn-manual">
            Manual
            <span class="mode-label">One task at a time</span>
          </button>
          <button class="mode-btn" id="btn-csv">
            CSV import
            <span class="mode-label">Bulk upload from a file</span>
          </button>
        </div>
        <div style="margin-top: 16px; text-align: center;">
          <button type="button" id="btn-load-active" class="btn-outline" style="font-size: 14px; padding: 10px 20px;">
            Load active tasks
          </button>
        </div>
      </section>

      <!-- Manual mode -->
      <section id="manual-section" class="hidden">
        <div class="panel">
          <form id="presentation-form">
            <div>
              <label for="topic">Topic</label>
              <input id="topic" name="topic" type="text" required placeholder="e.g. Wind energy" />
            </div>
            <div>
              <label for="author">Author</label>
              <input id="author" name="author" type="text" placeholder="Optional" />
            </div>
            <div>
              <label for="language">Language</label>
              <select id="language" name="language">
                <option value="kz">kz — Kazakh</option>
              </select>
            </div>
            <div>
              <label for="slides_amount">Number of slides</label>
              <select id="slides_amount" name="slides_amount">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="30">30</option>
              </select>
            </div>
            <div>
            <label for="grade">Grade / class</label>
              <select id="grade" name="grade">
                <option value="1">Grade 1</option>
                <option value="2">Grade 2</option>
                <option value="3">Grade 3</option>
                <option value="4">Grade 4</option>
                <option value="5">Grade 5</option>
                <option value="6">Grade 6</option>
                <option value="7">Grade 7</option>
                <option value="8">Grade 8</option>
                <option value="9">Grade 9</option>
                <option value="10">Grade 10</option>
                <option value="11">Grade 11</option>
              </select>
            </div>
            <div>
              <label for="subject">Subject</label>
              <input id="subject" name="subject" type="text" required placeholder="e.g. Math" />
            </div>
            <button type="submit" id="submit-btn">Start generation</button>
          </form>
          <div class="error" id="manual-error"></div>
        </div>
        <div class="add-task hidden" id="add-task">
          <button type="button" id="add-task-btn">+ New task</button>
        </div>
      </section>

      <!-- CSV mode -->
      <section class="panel hidden" id="csv-section">
        <form id="csv-form">
          <div>
            <label for="csv-file">CSV file (separator: ; &nbsp;&nbsp; encoding: UTF-8)</label>
            <input type="file" id="csv-file" accept=".csv" />
          </div>
          <div>
            <label for="csv-slides-amount">Number of slides</label>
            <select id="csv-slides-amount">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="30">30</option>
            </select>
          </div>
          <div class="csv-actions">
            <button type="button" id="btn-verify">Verify</button>
            <button type="button" id="btn-queue" class="btn-outline" disabled>Add to queue</button>
          </div>
        </form>
        <div id="csv-feedback"></div>
        <div class="error" id="queue-error"></div>
      </section>

      <!-- Shared task list -->
      <div class="tasks" id="tasks"></div>
    </main>

    {% csrf_token %}

    <script>
      // --- CSRF Token ---
      function getCsrfToken() {
        return document.querySelector('[name=csrfmiddlewaretoken]').value;
      }

      // --- Shared ---
      const API_TOKEN = "{{ api_token }}".trim();
      const sockets = new Map();
      const tasksEl = document.getElementById("tasks");
      const btnManual = document.getElementById("btn-manual");
      const btnCsv = document.getElementById("btn-csv");
      const btnLoadActive = document.getElementById("btn-load-active");
      let activeBackendOperations = 0;

      function getAuthHeaders() {
        const headers = {};
        if (API_TOKEN && API_TOKEN.length > 0) {
          headers["Authorization"] = `Bearer ${API_TOKEN}`;
        }
        // Add CSRF token for POST requests
        const csrfToken = getCsrfToken();
        if (csrfToken) {
          headers["X-CSRFToken"] = csrfToken;
        }
        return headers;
      }

      // REST client with auth headers
      async function apiFetch(url, options = {}) {
        const defaultHeaders = {
          "Content-Type": "application/json",
          ...getAuthHeaders()
        };

        const response = await fetch(url, {
          ...options,
          headers: {
            ...defaultHeaders,
            ...options.headers
          }
        });

        return response;
      }

      function syncModeButtonsState() {
        const shouldDisable = activeBackendOperations > 0;
        if (btnManual) btnManual.disabled = shouldDisable;
        if (btnCsv) btnCsv.disabled = shouldDisable;
        if (btnLoadActive) btnLoadActive.disabled = shouldDisable;
      }

      function startButtonLoading(button, text) {
        if (!button) return;
        if (button.dataset.loadingActive === "1") return;
        button.dataset.loadingActive = "1";
        activeBackendOperations += 1;
        syncModeButtonsState();
        if (!button.dataset.originalText) {
          button.dataset.originalText = button.textContent;
        }
        if (text) {
          button.textContent = text;
        }
        button.disabled = true;
        button.classList.add("is-loading");
      }

      function stopButtonLoading(button, { restoreText = true, text = null, disabled = false } = {}) {
        if (!button) return;
        if (button.dataset.loadingActive === "1") {
          button.dataset.loadingActive = "0";
          activeBackendOperations = Math.max(0, activeBackendOperations - 1);
          syncModeButtonsState();
        }
        button.classList.remove("is-loading");
        if (text !== null) {
          button.textContent = text;
        } else if (restoreText && button.dataset.originalText) {
          button.textContent = button.dataset.originalText;
        }
        button.disabled = disabled;
      }

      function formatTitle(payload) {
        return `${payload.topic} • ${payload.language} • ${payload.slides_amount} slides`;
      }

      function createTaskRow(payload) {
        const row = document.createElement("div");
        row.className = "task-row";
        row.dataset.presentationId = payload.id;

        const meta = document.createElement("div");
        meta.className = "task-meta";

        const title = document.createElement("div");
        title.className = "task-title";
        title.textContent = formatTitle(payload);

        const status = document.createElement("div");
        status.className = "task-status";
        status.textContent = "Queued";

        const progress = document.createElement("div");
        progress.className = "task-progress";
        const progressFill = document.createElement("span");
        progress.appendChild(progressFill);

        const links = document.createElement("div");
        links.className = "task-links";

        const error = document.createElement("div");
        error.className = "task-error";
        error.hidden = true;
        meta.append(title, status, error, progress, links);

        const actions = document.createElement("div");
        actions.className = "task-actions";
        actions.textContent = "Generating…";

        row.append(meta, actions);
        tasksEl.prepend(row);

        return { row, status, error, progressFill, links, actions };
      }

      function updateLinks(linksEl, files, fileUrls) {
        linksEl.innerHTML = "";
        if (!files || !fileUrls || files.length !== fileUrls.length) return;
        const seen = new Set();
        files.forEach((file, index) => {
          const url = fileUrls[index];
          if (!url || seen.has(url)) return;
          seen.add(url);
          const link = document.createElement("a");
          link.href = url;
          link.target = "_blank";
          link.rel = "noreferrer";
          const filename = file.split("/").slice(-1)[0] || `File ${index + 1}`;
          link.textContent = filename;
          linksEl.appendChild(link);
        });
      }

      function createFailedTaskRow(task) {
        const row = document.createElement("div");
        row.className = "task-row task-row--failed";
        row.dataset.presentationId = task.id;

        const meta = document.createElement("div");
        meta.className = "task-meta";

        const title = document.createElement("div");
        title.className = "task-title";
        title.textContent = formatTitle(task);

        const status = document.createElement("div");
        status.className = "task-status";
        const retryLabel = task.retry_count != null ? ` (${task.retry_count}/3 attempts)` : "";
        status.textContent = `Generation failed${retryLabel}`;

        const progress = document.createElement("div");
        progress.className = "task-progress";
        const progressFill = document.createElement("span");
        progressFill.style.width = "0%";
        progress.appendChild(progressFill);

        const links = document.createElement("div");
        links.className = "task-links";

        const error = document.createElement("div");
        error.className = "task-error";
        if (task.error_message) {
          error.textContent = task.error_message;
          error.hidden = false;
        } else {
          error.hidden = true;
        }
        meta.append(title, status, error, progress, links);

        const restartBtn = document.createElement("button");
        restartBtn.className = "btn-restart";
        restartBtn.textContent = "↺ Restart";
        restartBtn.addEventListener("click", async () => {
          startButtonLoading(restartBtn, "Starting…");
          try {
            const resp = await apiFetch(`/api/presentations/${task.id}/restart/`, { 
              method: "POST"
            });
            if (!resp.ok) {
              const errorText = await resp.text();
              console.error(`Restart failed: ${resp.status}`, errorText);
              throw new Error(`${resp.status}: ${errorText}`);
            }
            // Same ID — convert row in place: remove failed styling, add progress UI
            row.classList.remove("task-row--failed");
            status.textContent = "Queued";
            status.style.color = "";
            links.innerHTML = "";
            restartBtn.remove();
            const actionsEl = document.createElement("div");
            actionsEl.className = "task-actions";
            actionsEl.textContent = "Generating…";
            row.appendChild(actionsEl);
            error.textContent = "";
            error.hidden = true;
            sockets.delete(task.id);
            connectSocket(task.id, { row, status, error, progressFill, links, actions: actionsEl });
          } catch (err) {
            stopButtonLoading(restartBtn, { text: "↺ Restart", disabled: false, restoreText: false });
            alert(`Restart error: ${err.message}`);
          }
        });

        row.append(meta, restartBtn);
        tasksEl.prepend(row);
        sockets.set(task.id, null);
      }

      function connectSocket(presentationId, ui) {
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(
          `${protocol}://${window.location.host}/ws/presentations/${presentationId}/`
        );

        socket.onmessage = (event) => {
          const payload = JSON.parse(event.data || "{}");
          const percent = payload.percent ?? 0;
          const stage = payload.stage ?? "In progress";

          if (stage === "retrying") {
            const attempt = payload.retry_count ?? "?";
            const max = payload.max_retries ?? 3;
            ui.progressFill.style.width = "0%";
            ui.status.textContent = `Retry ${attempt}/${max}…`;
            ui.actions.textContent = "Retrying";
            if (ui.error) {
              ui.error.textContent = payload.error ?? "";
              ui.error.hidden = !payload.error;
            }
            return;
          }

          if (stage === "failed") {
            const attempt = payload.retry_count ?? 3;
            const max = payload.max_retries ?? 3;
            ui.row.classList.add("task-row--failed");
            ui.progressFill.style.width = "0%";
            ui.status.textContent = `Generation failed (${attempt}/${max} attempts)`;
            ui.actions.textContent = "Failed";
            if (ui.error) {
              ui.error.textContent = payload.error ?? "";
              ui.error.hidden = !payload.error;
            }
            return;
          }

          ui.row.classList.remove("task-row--failed");
          if (ui.error) {
            ui.error.textContent = "";
            ui.error.hidden = true;
          }
          ui.progressFill.style.width = `${percent}%`;
          ui.status.textContent = `${stage} (${percent}%)`;
          ui.actions.textContent = "Running";
          if (payload.files || payload.file_urls) {
            updateLinks(ui.links, payload.files, payload.file_urls);
          }
          if (stage === "completed" || stage === "done") {
            ui.actions.textContent = "Done";
          }
        };

        socket.onclose = () => {};
        sockets.set(presentationId, socket);
      }

      // --- Load active tasks ---
      async function loadActiveTasks() {
        const btn = btnLoadActive;
        startButtonLoading(btn, "Loading…");
        let added = 0;
        try {
          const resp = await apiFetch("/api/presentations/active/?limit=200");
          if (!resp.ok) {
            alert(`Failed to load active tasks: ${resp.status} ${resp.statusText}`);
            stopButtonLoading(btn, { text: "Load active tasks", disabled: false, restoreText: false });
            return;
          }
          const tasks = await resp.json();
          tasks.forEach((task) => {
            if (sockets.has(task.id)) return;
            if (task.status === "failed") {
              createFailedTaskRow(task);
            } else {
              const ui = createTaskRow(task);
              connectSocket(task.id, ui);
            }
            added++;
          });
          if (btn) {
            stopButtonLoading(btn, {
              text: added > 0 ? `Loaded ${added} task(s) — refresh` : "No new active tasks",
              disabled: false,
              restoreText: false,
            });
          }
        } catch (err) {
          alert(`Failed to load active tasks: ${err.message}`);
          stopButtonLoading(btn, { text: "Load active tasks", disabled: false, restoreText: false });
        }
      }

      btnLoadActive.addEventListener("click", loadActiveTasks);
      loadActiveTasks();

      // --- Mode selection ---
      btnManual.addEventListener("click", () => {
        document.getElementById("mode-selection").classList.add("hidden");
        document.getElementById("manual-section").classList.remove("hidden");
      });

      btnCsv.addEventListener("click", () => {
        document.getElementById("mode-selection").classList.add("hidden");
        document.getElementById("csv-section").classList.remove("hidden");
      });

      // --- Manual mode ---
      const form = document.getElementById("presentation-form");
      const submitBtn = document.getElementById("submit-btn");
      const manualError = document.getElementById("manual-error");
      const addTaskWrap = document.getElementById("add-task");
      const addTaskBtn = document.getElementById("add-task-btn");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        startButtonLoading(submitBtn, "Starting…");
        manualError.textContent = "";

        const payload = {
          topic: form.topic.value.trim(),
          author: form.author.value.trim() || null,
          language: form.language.value,
          slides_amount: parseInt(form.slides_amount.value, 10),
          grade: parseInt(form.grade.value, 10),
          subject: form.subject.value.trim(),
        };

        try {
          const response = await apiFetch("/api/presentations/", {
            method: "POST",
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || "Error creating presentation");
          }

          const result = await response.json();
          const ui = createTaskRow({ ...payload, id: result.id });
          connectSocket(result.id, ui);
          form.classList.add("hidden");
          addTaskWrap.classList.remove("hidden");
        } catch (err) {
          stopButtonLoading(submitBtn, { disabled: false });
          manualError.textContent = err.message || "Could not start generation";
        }
      });

      addTaskBtn.addEventListener("click", () => {
        form.reset();
        form.classList.remove("hidden");
        addTaskWrap.classList.add("hidden");
        stopButtonLoading(submitBtn, { disabled: false });
      });

      // --- CSV mode ---
      const LANG_MAP = { kazakh: "kz", russian: "ru", казахский: "kz", русский: "ru" };
      const VALID_LANGS = ["Kazakh", "Russian", "Казахский", "Русский"];
      function normLang(s) { return s.trim().replace(/[\s ﻿]+/g, "").toLowerCase(); }
      const EXPECTED_HEADERS = ["task_id", "book_id", "topic_title", "class", "subject", "lang"];
      const OPTIONAL_HEADERS = ["template"];

      const csvFile = document.getElementById("csv-file");
      const csvSlidesAmount = document.getElementById("csv-slides-amount");
      const btnVerify = document.getElementById("btn-verify");
      const btnQueue = document.getElementById("btn-queue");
      const csvFeedback = document.getElementById("csv-feedback");
      const queueError = document.getElementById("queue-error");

      let validatedRows = [];

      function splitCsvLine(line, sep) {
        const cells = [];
        let cur = "", inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; }
            else inQuotes = !inQuotes;
          } else if (ch === sep && !inQuotes) {
            cells.push(cur.trim()); cur = "";
          } else {
            cur += ch;
          }
        }
        cells.push(cur.trim());
        return cells;
      }

      function parseCsv(text) {
        const lines = text.split("\n").filter((l) => l.trim());
        if (lines.length < 2) {
          return {
            errors: [{ row: "—", field: "—", message: "File is empty or contains headers only" }],
            rows: [],
          };
        }

        const sep = lines[0].includes(";") ? ";" : ",";
        const headers = splitCsvLine(lines[0], sep).map((h) => h.toLowerCase());
        const missingHeaders = EXPECTED_HEADERS.filter((h) => !headers.includes(h));
        if (missingHeaders.length > 0) {
          return {
            errors: [{ row: 1, field: "headers", message: `Missing columns: ${missingHeaders.join(", ")}` }],
            rows: [],
          };
        }

        const idx = (name) => headers.indexOf(name);
        const errors = [];
        const rows = [];
        const seenTaskIds = new Set();

        for (let i = 1; i < lines.length; i++) {
          const rowNum = i + 1;
          const cells = splitCsvLine(lines[i], sep);
          const get = (name) => (cells[idx(name)] ?? "").trim();

          const task_id = get("task_id");
          const book_id_raw = get("book_id");
          const topic_title = get("topic_title");
          const class_raw = get("class");
          const subject = get("subject");
          const lang = get("lang");
          const template_raw = headers.includes("template") ? get("template") : "";

          let rowValid = true;

          if (!task_id) {
            errors.push({ row: rowNum, field: "task_id", message: "Cannot be empty" });
            rowValid = false;
          } else if (seenTaskIds.has(task_id)) {
            errors.push({ row: rowNum, field: "task_id", message: `Duplicate value "${task_id}"` });
            rowValid = false;
          } else {
            seenTaskIds.add(task_id);
          }

          let book_id = null;
          if (!book_id_raw) {
            errors.push({ row: rowNum, field: "book_id", message: "Cannot be empty" });
            rowValid = false;
          } else {
            book_id = parseInt(book_id_raw, 10);
            if (isNaN(book_id)) {
              errors.push({ row: rowNum, field: "book_id", message: "Must be an integer" });
              rowValid = false;
            }
          }

          if (!topic_title) {
            errors.push({ row: rowNum, field: "topic_title", message: "Cannot be empty" });
            rowValid = false;
          }

          let grade = null;
          if (!class_raw) {
            errors.push({ row: rowNum, field: "class", message: "Cannot be empty" });
            rowValid = false;
          } else {
            grade = parseInt(class_raw, 10);
            if (isNaN(grade) || grade < 1 || grade > 11) {
              errors.push({ row: rowNum, field: "class", message: "Must be a number from 1 to 11" });
              rowValid = false;
            }
          }

          if (!subject) {
            errors.push({ row: rowNum, field: "subject", message: "Cannot be empty" });
            rowValid = false;
          }

          if (!LANG_MAP[normLang(lang)]) {
            errors.push({ row: rowNum, field: "lang", message: `Allowed: ${VALID_LANGS.join(", ")}` });
            rowValid = false;
          }

          let template = null;
          if (template_raw && template_raw.toLowerCase() !== "none") {
            template = parseInt(template_raw, 10);
            if (isNaN(template)) {
              errors.push({ row: rowNum, field: "template", message: "Must be a number or empty" });
              rowValid = false;
            }
          }

          if (rowValid) {
            rows.push({
              task_id,
              book_id,
              topic: topic_title,
              grade,
              subject,
              language: LANG_MAP[normLang(lang)],
              template,
            });
          }
        }

        return { errors, rows };
      }

      function renderFeedback({ errors, rows, skippedCount = 0 }) {
        csvFeedback.innerHTML = "";

        if (errors.length > 0) {
          const header = document.createElement("div");
          header.className = "feedback-error-header";
          header.textContent = `Errors found: ${errors.length}`;
          csvFeedback.appendChild(header);

          const table = document.createElement("table");
          table.className = "error-table";
          table.innerHTML = `<thead><tr><th>Row</th><th>Field</th><th>Error</th></tr></thead>`;
          const tbody = document.createElement("tbody");
          errors.forEach(({ row, field, message }) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${row}</td><td>${field}</td><td>${message}</td>`;
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          csvFeedback.appendChild(table);
        } else {
          const success = document.createElement("div");
          success.className = "feedback-success";
          const skipNote = skippedCount > 0 ? ` Skipped ${skippedCount} (task_id already in database).` : "";
          success.textContent = `File validated: ${rows.length} new row(s).${skipNote} Ready to add to queue.`;
          csvFeedback.appendChild(success);
        }
      }

      csvFile.addEventListener("change", () => {
        validatedRows = [];
        btnQueue.disabled = true;
        csvFeedback.innerHTML = "";
        queueError.textContent = "";
      });

      btnVerify.addEventListener("click", () => {
        const file = csvFile.files[0];
        if (!file) {
          csvFeedback.innerHTML = '<div class="error" style="margin-top:8px">Select a file</div>';
          return;
        }

        startButtonLoading(btnVerify, "Validating…");
        btnQueue.disabled = true;

        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const { errors, rows } = parseCsv(e.target.result);

            if (errors.length > 0 || rows.length === 0) {
              renderFeedback({ errors, rows });
              validatedRows = [];
              btnQueue.disabled = true;
              return;
            }

            // Check which task_ids already exist in the DB.
            let existingSet = new Set();
            try {
              const resp = await apiFetch("/api/presentations/check-task-ids/", {
                method: "POST",
                body: JSON.stringify({ task_ids: rows.map((r) => r.task_id).filter(Boolean) }),
              });
              if (resp.ok) {
                const data = await resp.json();
                existingSet = new Set(data.existing || []);
              }
            } catch (err) {
              console.warn("Failed to check existing task_ids:", err);
              // If the check fails, proceed with all rows (server will deduplicate anyway).
            }

            const newRows = rows.filter((r) => !existingSet.has(r.task_id));
            const skippedCount = rows.length - newRows.length;

            validatedRows = newRows;
            renderFeedback({ errors: [], rows: newRows, skippedCount });
            btnQueue.disabled = newRows.length === 0;
          } finally {
            stopButtonLoading(btnVerify, { disabled: false });
          }
        };
        reader.onerror = () => {
          stopButtonLoading(btnVerify, { disabled: false });
          csvFeedback.innerHTML = '<div class="error" style="margin-top:8px">Error reading file</div>';
          btnQueue.disabled = true;
        };
        reader.readAsText(file, "UTF-8");
      });

      btnQueue.addEventListener("click", async () => {
        if (validatedRows.length === 0) return;

        startButtonLoading(btnQueue, "Adding…");
        btnVerify.disabled = true;
        queueError.textContent = "";

        const slidesAmount = parseInt(csvSlidesAmount.value, 10);

        try {
          const response = await apiFetch("/api/presentations/import/", {
            method: "POST",
            body: JSON.stringify({
              slides_amount: slidesAmount,
              items: validatedRows.map((row) => ({
                topic: row.topic,
                language: row.language,
                grade: row.grade,
                subject: row.subject,
                author: null,
                task_id: row.task_id,
                book_id: row.book_id,
                template: row.template,
              })),
            }),
          });

          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.detail || "Error creating batch");
          }

          const result = await response.json();
          const created = result.created || [];
          const skippedCount = result.skipped_count || 0;

          created.forEach((item) => {
            const ui = createTaskRow({
              topic: item.topic,
              language: item.language,
              slides_amount: item.slides_amount,
              id: item.id,
            });
            connectSocket(item.id, ui);
          });

          queueError.textContent = skippedCount > 0 ? `Skipped ${skippedCount} row(s) (already exist / duplicate).` : "";
        } catch (err) {
          queueError.textContent = err?.message || "Unknown error";
        } finally {
          stopButtonLoading(btnQueue, { disabled: false });
          btnVerify.disabled = false;
        }
      });
    </script>
  </body>
</html>
